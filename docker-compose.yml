services:
  web:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped

  web-live:
    image: nginx:1.27-alpine
    profiles:
      - dev-live
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
