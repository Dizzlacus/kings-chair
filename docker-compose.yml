services:
  web:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./index.html
          target: /usr/share/nginx/html/index.html
        - action: sync
          path: ./terms.html
          target: /usr/share/nginx/html/terms.html
        - action: sync
          path: ./privacy.html
          target: /usr/share/nginx/html/privacy.html
        - action: sync
          path: ./favicon.svg
          target: /usr/share/nginx/html/favicon.svg
        - action: sync
          path: ./js
          target: /usr/share/nginx/html/js
        - action: sync
          path: ./images
          target: /usr/share/nginx/html/images
        - action: sync+restart
          path: ./nginx/nginx.conf
          target: /etc/nginx/conf.d/default.conf
        - action: rebuild
          path: ./Dockerfile
