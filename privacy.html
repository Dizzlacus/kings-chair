<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Privacy Policy — King's Chair</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              display: ["Cinzel", "Georgia", "serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --site-gutter: 1.5rem;
      }
      @media (min-width: 640px) {
        :root {
          --site-gutter: 2rem;
        }
      }
      @media (min-width: 768px) {
        :root {
          --site-gutter: 2.5rem;
        }
      }
      @media (min-width: 1024px) {
        :root {
          --site-gutter: 4rem;
        }
      }
      .site-container {
        width: 100%;
        padding-left: var(--site-gutter);
        padding-right: var(--site-gutter);
      }
    </style>
  </head>
  <body class="min-h-screen w-full max-w-full overflow-x-hidden bg-black text-white antialiased">
    <nav class="border-b border-white/10 bg-black/95 backdrop-blur-sm">
      <div class="site-container h-16 flex items-center">
        <a href="index.html" class="text-sm font-semibold tracking-wider text-white hover:text-[#f46910] transition-colors">← King's Chair</a>
      </div>
    </nav>
    <main class="site-container py-12 md:py-16">
      <div class="max-w-3xl">
      <h1 class="font-display text-3xl md:text-4xl font-semibold mb-6">Privacy Policy</h1>
      <p class="text-white/65 leading-relaxed mb-4">
        This is a placeholder privacy policy for the King's Chair website. Replace this text with your own policy describing how you collect,
        use, and protect personal information (including contact details and analytics, if applicable).
      </p>
      <p class="text-white/65 leading-relaxed mb-4">
        Last updated: <span id="privacy-date"></span>
      </p>
      </div>
    </main>
    <footer class="border-t border-white/10 py-8 text-center text-sm text-white/60">
      <a href="index.html" class="hover:text-[#f46910] transition-colors">Back to home</a>
    </footer>
    <script>
      document.getElementById("privacy-date").textContent = new Date().toLocaleDateString("en-AU", {
        year: "numeric",
        month: "long",
        day: "numeric",
      });
    </script>
  </body>
</html>
